name: Build Electron App

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
            artifact_name: MC-Bot-Manager-Windows
          - os: macos-latest
            platform: mac
            artifact_name: MC-Bot-Manager-macOS
          - os: ubuntu-latest
            platform: linux
            artifact_name: MC-Bot-Manager-Linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install Linux system dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-0 \
            libnotify4 \
            libnss3 \
            libxss1 \
            libxtst6 \
            xdg-utils \
            libatspi2.0-0 \
            libuuid1 \
            libsecret-1-0 \
            libgbm1 \
            fuse \
            libfuse2

      - name: Install workspace dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Install platform-specific rollup native module
        shell: bash
        run: |
          PKG=$(node -e "
            const plat = process.platform;
            const arch = process.arch;
            const map = {
              'linux-x64':   '@rollup/rollup-linux-x64-gnu',
              'darwin-x64':  '@rollup/rollup-darwin-x64',
              'darwin-arm64':'@rollup/rollup-darwin-arm64',
              'win32-x64':   '@rollup/rollup-win32-x64-msvc',
            };
            console.log(map[plat+'-'+arch] || '');
          ")
          if [ -n "$PKG" ]; then
            echo "Installing $PKG for rollup native support"
            npm install --no-save "$PKG"
          fi

      - name: Run codegen
        shell: bash
        run: |
          pnpm --filter @workspace/api-spec run codegen
          echo 'export * from "./generated/api";' > lib/api-zod/src/index.ts

      - name: Build API server
        run: pnpm --filter @workspace/api-server run build

      - name: Build frontend
        run: pnpm --filter @workspace/minecraft-bot run build
        env:
          BASE_PATH: /

      - name: Install Electron app dependencies
        working-directory: electron-app
        run: npm install

      - name: Build Electron app — Windows
        if: matrix.platform == 'win'
        working-directory: electron-app
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Electron app — macOS
        if: matrix.platform == 'mac'
        working-directory: electron-app
        run: npm run build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Electron app — Linux
        if: matrix.platform == 'linux'
        working-directory: electron-app
        run: npm run build:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifacts
        if: matrix.platform == 'win'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            electron-app/dist/*.exe
            electron-app/dist/*.msi
          if-no-files-found: error

      - name: Upload macOS artifacts
        if: matrix.platform == 'mac'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: electron-app/dist/*.dmg
          if-no-files-found: error

      - name: Upload Linux artifacts
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            electron-app/dist/*.AppImage
            electron-app/dist/*.deb
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/**/*
          generate_release_notes: true
          name: "MC Bot Manager ${{ github.ref_name }}"
          body: |
            ## MC Bot Manager ${{ github.ref_name }}

            ### Скачать / Download

            | Платформа | Файл |
            |-----------|------|
            | Windows | `.exe` установщик |
            | macOS | `.dmg` образ |
            | Linux | `.AppImage` / `.deb` |

            ### Требования / Requirements
            - [Ollama](https://ollama.com) для локального ИИ
            - Minecraft Java Edition сервер для подключения ботов
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
