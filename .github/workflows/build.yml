name: Build Electron App

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
            artifact_name: MC-Bot-Manager-Windows
          - os: macos-latest
            platform: mac
            artifact_name: MC-Bot-Manager-macOS
          - os: ubuntu-latest
            platform: linux
            artifact_name: MC-Bot-Manager-Linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install Linux system dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-0 \
            libnotify4 \
            libnss3 \
            libxss1 \
            libxtst6 \
            xdg-utils \
            libatspi2.0-0 \
            libuuid1 \
            libsecret-1-0 \
            libgbm1 \
            fuse \
            libfuse2

      - name: Install workspace dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Install platform-specific native modules (rollup + lightningcss)
        shell: bash
        run: |
          PLAT_ARCH="${{ runner.os }}-$(node -e 'console.log(process.arch)')"
          echo "Platform: $PLAT_ARCH"
          TMPDIR_PKG=$(mktemp -d)
          echo '{"name":"tmp","version":"1.0.0"}' > "$TMPDIR_PKG/package.json"

          case "$PLAT_ARCH" in
            Linux-x64)
              ROLLUP_PKG="@rollup/rollup-linux-x64-gnu"
              CSS_PKG="lightningcss-linux-x64-gnu"
              ;;
            macOS-arm64)
              ROLLUP_PKG="@rollup/rollup-darwin-arm64"
              CSS_PKG="lightningcss-darwin-arm64"
              ;;
            macOS-x64)
              ROLLUP_PKG="@rollup/rollup-darwin-x64"
              CSS_PKG="lightningcss-darwin-x64"
              ;;
            Windows-x64)
              ROLLUP_PKG="@rollup/rollup-win32-x64-msvc"
              CSS_PKG="lightningcss-win32-x64-msvc"
              ;;
          esac

          if [ -n "$ROLLUP_PKG" ]; then
            echo "Installing $ROLLUP_PKG"
            npm install --prefix "$TMPDIR_PKG" --no-save "$ROLLUP_PKG"
            ROLLUP_DIR=$(echo "$ROLLUP_PKG" | cut -d'/' -f2)
            mkdir -p "$GITHUB_WORKSPACE/node_modules/@rollup"
            cp -r "$TMPDIR_PKG/node_modules/@rollup/$ROLLUP_DIR" "$GITHUB_WORKSPACE/node_modules/@rollup/" || true
          fi

          if [ -n "$CSS_PKG" ]; then
            echo "Installing $CSS_PKG"
            npm install --prefix "$TMPDIR_PKG" --no-save "$CSS_PKG"
            mkdir -p "$GITHUB_WORKSPACE/node_modules"
            cp -r "$TMPDIR_PKG/node_modules/$CSS_PKG" "$GITHUB_WORKSPACE/node_modules/" || true
          fi

          echo "Native modules installed"

      - name: Run codegen
        shell: bash
        run: |
          pnpm --filter @workspace/api-spec exec orval --config ./orval.config.ts
          echo 'export * from "./generated/api";' > lib/api-zod/src/index.ts
          pnpm run typecheck:libs

      - name: Build API server
        run: pnpm --filter @workspace/api-server run build

      - name: Build frontend
        run: pnpm --filter @workspace/minecraft-bot run build
        env:
          BASE_PATH: /

      - name: Install Electron app dependencies
        working-directory: electron-app
        run: npm install

      - name: Build Electron app — Windows
        if: matrix.platform == 'win'
        working-directory: electron-app
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Electron app — macOS
        if: matrix.platform == 'mac'
        working-directory: electron-app
        run: npm run build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Electron app — Linux
        if: matrix.platform == 'linux'
        working-directory: electron-app
        run: npm run build:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifacts
        if: matrix.platform == 'win'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            electron-app/dist/*.exe
            electron-app/dist/*.msi
          if-no-files-found: error

      - name: Upload macOS artifacts
        if: matrix.platform == 'mac'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: electron-app/dist/*.dmg
          if-no-files-found: error

      - name: Upload Linux artifacts
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            electron-app/dist/*.AppImage
            electron-app/dist/*.deb
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/**/*
          generate_release_notes: true
          name: "MC Bot Manager ${{ github.ref_name }}"
          body: |
            ## MC Bot Manager ${{ github.ref_name }}

            ### Скачать / Download

            | Платформа | Файл |
            |-----------|------|
            | Windows | `.exe` установщик |
            | macOS | `.dmg` образ |
            | Linux | `.AppImage` / `.deb` |

            ### Требования / Requirements
            - [Ollama](https://ollama.com) для локального ИИ
            - Minecraft Java Edition сервер для подключения ботов
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
