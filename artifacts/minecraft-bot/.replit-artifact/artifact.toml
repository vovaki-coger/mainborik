kind = "web"
previewPath = "/"
title = "Minecraft Bot Manager"
version = "1.0.0"
id = "artifacts/minecraft-bot"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23418

[services.development]
run = "pnpm --filter @workspace/minecraft-bot run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/minecraft-bot", "run", "build" ]
publicDir = "artifacts/minecraft-bot/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23418"
BASE_PATH = "/"
